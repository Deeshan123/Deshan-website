```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Scroll Mega Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
scroll-behavior:smooth;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
z-index:1000;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(270deg,#020617,#0f172a,#020617);
}

.hero h1{
font-size:70px;
margin-bottom:20px;
}

.hero p{
max-width:600px;
color:#cbd5e1;
}

/* SECTIONS */

.section{
padding:120px 10%;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.section h2{
margin-bottom:20px;
font-size:35px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#0f172a;
padding:30px;
border-radius:15px;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
}

/* QR SECTION */

#qrSection{
text-align:center;
padding:150px 10%;
}

#qr canvas{
margin-top:20px;
background:white;
padding:10px;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
background:black;
}

</style>

</head>

<body>

<nav>

<h2>UniverseX</h2>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Sections</a></li>
<li><a href="#">Gallery</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

<section class="hero">

<h1>Infinite Scroll Website</h1>

<p>Scroll down... this page keeps going for a long time.</p>

</section>

<div id="content"></div>

<section id="qrSection">

<h1>Website QR Code</h1>

<p>Scan this QR to open this website.</p>

<div id="qr"></div>

</section>

<footer>

<p>© 2026 UniverseX</p>

</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

/* CREATE MANY SECTIONS */

const container=document.getElementById("content")

for(let i=1;i<=120;i++){

let section=document.createElement("section")

section.className="section"

section.innerHTML=`

<h2>Section ${i}</h2>

<p>This is part of a very long scrolling website. Keep scrolling to explore more content.</p>

<div class="grid">

<div class="card">Creative Design</div>
<div class="card">Modern Development</div>
<div class="card">Powerful Performance</div>
<div class="card">Future Technology</div>

</div>

<br><br>

<div class="gallery">

<img src="https://picsum.photos/400/300?random=${i}">
<img src="https://picsum.photos/400/300?random=${i+1}">
<img src="https://picsum.photos/400/300?random=${i+2}">

</div>

`

container.appendChild(section)

}

/* GENERATE QR CODE */

new QRCode(document.getElementById("qr"),{

text:window.location.href,
width:200,
height:200

})

</script>

</body>
</html>
```
